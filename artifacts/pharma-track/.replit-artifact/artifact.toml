kind = "web"
previewPath = "/"
title = "Predictive Pharmaceutical Tracking & Provenance"
version = "1.0.0"
id = "artifacts/pharma-track"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23015

[services.development]
run = "pnpm --filter @workspace/pharma-track run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pharma-track", "run", "build" ]
publicDir = "artifacts/pharma-track/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23015"
BASE_PATH = "/"
